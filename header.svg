<svg width="100%" height="300" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cardClip">
      <rect x="60" y="40" width="580" height="220" rx="22" ry="22"/>
    </clipPath>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#D6477B" flood-opacity="0.25"/>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="0" flood-color="#FF8FAB" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g style="opacity:0">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0s" fill="freeze"/>

    <!-- card -->
    <g filter="url(#cardShadow)">
      <g clip-path="url(#cardClip)">
        <rect x="60" y="40" width="580" height="220" fill="#FFEDF3"/>
        <rect x="60" y="40" width="580" height="44" fill="#FF6F9C"/>
      </g>
      <rect x="60" y="40" width="580" height="220" rx="22" ry="22" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5"/>
    </g>

    <!-- title bar caption -->
    <text x="90" y="67" font-family="'Courier New', monospace" font-size="12" font-weight="bold" letter-spacing="2" fill="#FFFFFF">github.com/AgusCabral</text>

    <!-- close icon -->
    <g transform="translate(602,52)">
      <rect width="26" height="26" rx="7" fill="#FFFFFF" opacity="0.25"/>
      <line x1="7" y1="7" x2="19" y2="19" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="19" y1="7" x2="7" y2="19" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
    </g>

    <!-- main text -->
    <text x="350" y="158" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="32" font-weight="bold" fill="#FF96B9" filter="url(#textGlow)">AGUSTINA CABRAL</text>

    <!-- subtitle -->
    <text x="350" y="192" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" font-weight="bold" letter-spacing="1" fill="#FF96B9">QA SSR</text>
  </g>
</svg>
